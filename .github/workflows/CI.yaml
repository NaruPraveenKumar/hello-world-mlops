name: ci for train a model

on: 
push:
 branches: [main]
pull_request:
 branches: [main]

 job:
  matrix_pi:
   name: ci for mlops project concurrency
   runs_one: ubuntu-latest
   strategy:
     matrix: 
       python: [3.11,3.12]
  steps:
    - name: checkout 
      uses: actions@checkout@v4
    - name: setup a python
      uses: actions@python@v4
      with:
        python-version: ${{ matrix.python }}
    - name: upgrade pip
      run: python -m pip install --upgrade pip setuptools wheel
    - name: install project dependencies concurrency: 
      run: python -m pip install -r requrements.txt 
    - name : train the model 
      run: |
        python train.py 
        ls -l artifacts
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
          name: ml-artifacts-${{ matrix.python }}-${{ github.run_id }}
          path: artifacts
